kind = "web"
previewPath = "/"
title = "Road Trip Bingo Word Database"
version = "1.0.0"
id = "artifacts/bingo-db"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21491

[services.development]
run = "pnpm --filter @workspace/bingo-db run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bingo-db", "run", "build" ]
publicDir = "artifacts/bingo-db/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21491"
BASE_PATH = "/"
